# EnviroTest — reverse proxy Nginx (couche serveur)
# Complète Bucket4j (couche Spring Boot).
#
# Installation (Linux / VM) :
#   sudo cp envirotest.conf /etc/nginx/conf.d/envirotest.conf
#   sudo nginx -t && sudo systemctl reload nginx
#
# Windows : inclure ce fichier depuis nginx.conf avec  include conf.d/envirotest.conf;
#
# Point d'entrée unique : http://localhost:8081
#   /           → Angular (dev :4200 | prod : fichiers statiques)
#   /projet/    → Spring Boot :8089 (context-path /projet)
#   /grafana/   → Grafana sur la VM

worker_processes auto;

events {
    worker_connections 2048;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    server_tokens   off;          # masque la version Nginx

    # ── Logs (analyse d'attaques / corrélation avec alertes Spring) ──
    log_format security '$remote_addr - $remote_user [$time_local] '
                        '"$request" $status $body_bytes_sent '
                        '"$http_referer" "$http_user_agent" '
                        'rt=$request_time u="$upstream_addr"';
    access_log /var/log/nginx/envirotest-access.log security;
    error_log  /var/log/nginx/envirotest-error.log warn;

    # ── Limites globales HTTP ──
    client_max_body_size 10m;     # uploads PDF / artifacts
    client_body_timeout  12s;
    client_header_timeout 12s;

    # ── Rate limiting (zone = mémoire partagée par IP) ──
    # rate=100r/m → 100 requêtes par minute par IP (~1,6 req/s)
    limit_req_zone  $binary_remote_addr zone=global_limit:20m rate=100r/m;
    limit_req_zone  $binary_remote_addr zone=login_limit:10m  rate=20r/m;
    limit_req_zone  $binary_remote_addr zone=admin_limit:10m  rate=60r/m;
    limit_req_status 429;         # aligné avec Spring (429 Too Many Requests)

    # Connexions simultanées max par IP
    limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

    # ── Upstreams ──
    upstream spring_backend {
        server 127.0.0.1:8089;
        keepalive 32;
    }

    upstream angular_dev {
        server 127.0.0.1:4200;
        keepalive 16;
    }

    upstream grafana_vm {
        server 192.168.130.138:30000;
        keepalive 8;
    }

    # ── Cartographie IP réelle (si Nginx est derrière un autre LB) ──
    # set_real_ip_from 10.0.0.0/8;
    # real_ip_header X-Forwarded-For;
    # real_ip_recursive on;

    server {
        listen 8081;
        server_name localhost envirotest.local;

        # ── En-têtes de sécurité (couche serveur) ──
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "0" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
        # Activer uniquement avec HTTPS :
        # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        # ── Blocage immédiat (WAF léger Nginx — avant Spring) ──
        location ~* \.(env|git|sql|bak|old|swp)$ {
            return 403;
        }
        location ~* ^/(wp-admin|wp-login\.php|phpmyadmin|\.env|\.git|admin/secret|actuator) {
            return 403;
        }
        location ~* ^/projet/(wp-admin|\.env|admin/secret|actuator) {
            return 403;
        }

        # ── Swagger / OpenAPI : bloquer en prod bancaire ──
        location ~ ^/projet/(swagger-ui|v3/api-docs) {
            return 403;
            # Dev uniquement — commenter return 403 et décommenter :
            # proxy_pass http://spring_backend;
        }

        # ── API Spring Boot — login (limite stricte) ──
        location = /projet/auth/login {
            limit_req zone=login_limit burst=5 nodelay;
            limit_conn conn_limit 20;

            proxy_pass http://spring_backend;
            include conf.d/proxy-headers.conf;
        }

        # ── API Spring Boot — admin (limite dédiée) ──
        location /projet/api/admin/ {
            limit_req zone=admin_limit burst=15 nodelay;
            limit_conn conn_limit 30;

            proxy_pass http://spring_backend;
            include conf.d/proxy-headers.conf;
        }

        # ── API Spring Boot — reste (/projet/*) ──
        location /projet/ {
            limit_req zone=global_limit burst=20 nodelay;
            limit_conn conn_limit 50;

            proxy_pass http://spring_backend;
            include conf.d/proxy-headers.conf;

            proxy_connect_timeout 60s;
            proxy_send_timeout    120s;
            proxy_read_timeout    120s;
        }

        # ── Grafana (VM) ──
        location /grafana/ {
            limit_req zone=global_limit burst=10 nodelay;

            proxy_pass http://grafana_vm/grafana/;
            proxy_http_version 1.1;
            proxy_set_header Host localhost;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_cookie_path /grafana/ /grafana/;
        }

        # ── Frontend Angular ──
        # DEV : proxy vers ng serve (4200)
        location / {
            limit_req zone=global_limit burst=30 nodelay;

            proxy_pass http://angular_dev;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
        }

        # PROD : remplacer le bloc location / ci-dessus par :
        # root /var/www/envirotest;
        # index index.html;
        # location / {
        #     limit_req zone=global_limit burst=30 nodelay;
        #     try_files $uri $uri/ /index.html;
        # }
    }
}
