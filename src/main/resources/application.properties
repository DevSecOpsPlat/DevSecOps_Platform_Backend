spring.application.name=DevSecOpsPlatform_Backend

server.port=8089

### DATABASE ###
spring.datasource.url=jdbc:postgresql://localhost:5432/EnviroTest
spring.datasource.username=postgres
spring.datasource.password=admin

### JPA / HIBERNATE (schéma généré depuis les entités — pas de Flyway) ###
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update

# Logging
logging.level.root=info
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} -%level -%logger{60} %msg %n

# Debug Spring Security (diagnostic des 403)
logging.level.org.springframework.security=DEBUG

server.servlet.context-path=/projet
# Derrière Nginx reverse proxy — honorer X-Forwarded-For / X-Real-IP
server.forward-headers-strategy=framework

springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# jwt (expiration en ms : 86400000 = 24 h ; évite "utilisateur non connecté" après quelques minutes)
app.secret-key=ee0c0ac2-e024-4bb4-a5b0-4296959c1e3d
app.expiration-time=86400000

# --- Surveillance sécurité (détection d'attaques en temps réel) ---
app.security.monitoring-enabled=true
# Dev local : ne pas bloquer/limiter 127.0.0.1 — mettre false en prod derrière Nginx
app.security.trust-localhost=true
# Force brute IP : 5 échecs de connexion / minute → blocage 30 min
app.security.brute-force.ip-failure-threshold=5
app.security.brute-force.ip-window-minutes=1
app.security.brute-force.ip-block-minutes=30
# Rate limiting Bucket4j : 200 req/min global, 20/min sur login, 100/min admin
app.security.rate-limit.max-requests=200
app.security.rate-limit.window-seconds=60
app.security.rate-limit.login-max-requests=20
app.security.rate-limit.login-window-seconds=60
app.security.rate-limit.admin-max-requests=100
app.security.rate-limit.admin-window-seconds=60
app.security.blocklist.enabled=true
app.security.blocklist.cleanup-interval-ms=300000
# Honeypot / payload malveillant : blocage 60 min ; rate limit répété : 15 min
app.security.blocklist.honeypot-block-minutes=60

# --- Coffre-fort / protection des données ---
# TLS : terminé par Nginx (voir deploy/nginx/envirotest-ssl.conf.example)
# En prod : app.security.data-protection.require-https=true + certificat HTTPS
app.security.data-protection.require-https=false
app.security.data-protection.hsts-enabled=true
app.security.data-protection.hsts-max-age-seconds=31536000
# Clé AES-256-GCM pour tokens GitHub, secrets 2FA (32+ car.) — JAMAIS en prod par défaut :
# ENCRYPTION_SECRET_KEY=$(openssl rand -base64 32)
app.security.blocklist.rate-limit-block-minutes=15

# --- Double authentification TOTP (Google / Microsoft Authenticator) ---
app.two-factor.issuer=EnviroTest
app.two-factor.required-for-admin=true

spring.jackson.serialization.write-dates-as-timestamps=false

# --- E-mail activation compte ---
# Gmail (recommandé) : mot de passe d'application → variable PASSSMTP
#   https://myaccount.google.com/apppasswords
# Brevo (alternative) : voir commentaire en bas de fichier
app.frontend-url=http://localhost:4200
app.mail.enabled=true
app.mail.from=amanibennaceur1234@gmail.com
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=amanibennaceur1234@gmail.com
spring.mail.password=${PASSSMTP:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.test-connection=false
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.mail.MailSenderAutoConfiguration
# Brevo (décommenter et commenter Gmail ci-dessus si besoin) :
# spring.mail.host=smtp-relay.brevo.com
# spring.mail.username=VOTRE_LOGIN_SMTP_BREVO
# app.mail.from=email-verifie-dans-brevo@domaine.com
# Note Brevo : en mode test, seuls les e-mails vérifiés dans Brevo reçoivent les messages.
# --- Configuration GitLab ---
gitlab.url=https://gitlab.com
gitlab.api-url=https://gitlab.com/api/v4

gitlab.project-id=${GITLAB_PROJECT_ID:79441224}

# NE METS PAS LE VRAI TOKEN ICI. Configure-le dans IntelliJ ou ton OS.
gitlab.token=${GITLAB_TOKEN:CONFIGURED}
encryption.secret-key=${ENCRYPTION_SECRET_KEY:MySecretKey12345MySecretKey12345}

# Webhook GitLab (optionnel)
# Si tu définis un Secret token dans GitLab → mets la même valeur ici (idéalement via variable d'env)
gitlab.webhook.secret=${GITLAB_WEBHOOK_SECRET:CONFIGURED}

# Token partagé pour le callback « déploiement publié » (job GitLab → POST /api/webhooks/deployment-published)
# Même valeur que la variable CI GitLab DEPLOYMENT_CALLBACK_TOKEN (chaîne secrète au choix, ex. output de: openssl rand -hex 32)
deployment.callback.token=${DEPLOYMENT_CALLBACK_TOKEN:}

# Aperçu / lien « Visiter » sans callback : URL nip.io dérivée de l’UUID d’environnement (comme ton Ingress)
# Exemple : https://app-<uuid>.192.168.130.138.nip.io:30374 (TLS côté nginx / Ingress)
deployment.preview.nip.enabled=${DEPLOYMENT_PREVIEW_NIP_ENABLED:true}
deployment.preview.nip.scheme=${DEPLOYMENT_PREVIEW_NIP_SCHEME:https}
deployment.preview.nip.master-ip=${DEPLOYMENT_PREVIEW_NIP_MASTER_IP:192.168.130.138}
deployment.preview.nip.node-port=${DEPLOYMENT_PREVIEW_NIP_NODE_PORT:30694}
# Timeout GitLab (secondes)
gitlab.timeout.seconds=2

# Cache
spring.cache.type=caffeine
spring.cache.caffeine.spec=maximumSize=500,expireAfterWrite=300s
# --- Configuration Pipeline ---
# Ici on utilise ton chemin exact
pipeline.template-project=amanibennaceur-group/EnviroTest
pipeline.default-branch=master
pipeline.timeout-minutes=30

# --- DefectDojo (dashboard sécurité centralisé) ---
# URL publique du tunnel (ex. https://xxxx.trycloudflare.com) — identique à la variable GitLab CI DEFECTDOJO_URL.
# Pas de slash final, pas de chemin (/login). Redémarrer le backend après modification.
defectdojo.url=${DEFECTDOJO_URL:}
defectdojo.token=${DEFECTDOJO_TOKEN:}
defectdojo.critical-threshold=${CRITICAL_THRESHOLD:5}
# true = ignorer erreurs SSL (certificat auto-signé / hostname) — dev uniquement
defectdojo.insecure-ssl=${DEFECTDOJO_INSECURE_SSL:false}

# --- SonarQube / SonarCloud ---
sonarqube.host-url=${SONAR_HOST_URL:https://sonarcloud.io}
sonarqube.token=${SONAR_TOKEN:CONFIGURED}
sonarqube.project-key=${SONARQUBE_PROJECT_KEY:CONFIGURED}
sonarqube.default-assignee=${SONARQUBE_DEFAULT_ASSIGNEE:CONFIGURED}
# Langue des descriptions de règles / messages Sonar (header Accept-Language)
sonarqube.accept-language=${SONAR_ACCEPT_LANGUAGE:fr}

# --- Traduction EN → FR (descriptions de règles Sonar) ---
# Provider par défaut : mymemory (gratuit, sans clé API — ~1000 mots/jour, 10 000 avec email)
translation.enabled=${TRANSLATION_ENABLED:true}
translation.provider=${TRANSLATION_PROVIDER:mymemory}
translation.mymemory.email=${TRANSLATION_MYMEMORY_EMAIL:amanibennaceur1234@gmail.com}
# LibreTranslate officiel nécessite une clé payante (https://portal.libretranslate.com)
libretranslate.url=${LIBRETRANSLATE_URL:https://libretranslate.com}
libretranslate.api-key=${LIBRETRANSLATE_API_KEY:}
# --- Analyse IA des artifacts (plusieurs providers, sans carte) ---
# Provider : groq (recommandé) | huggingface | ollama (local) | gemini
# Par défaut : groq ; quota Groq (429) → OpenRouter (qwen puis deepseek) → Gemini → Ollama async
# Ollama : ollama pull qwen2.5-coder:7b puis laisser le service tourner sur http://localhost:11434
ai.provider=${AI_PROVIDER:groq}
ai.enabled=${AI_ENABLED:true}
# Langue des réponses IA (fr = français obligatoire dans les prompts)
ai.response-language=${AI_RESPONSE_LANGUAGE:fr}

# Remédiation finding — cache BDD + templates OWASP (désactiver pour tester les modèles IA)
ai.remediation.cache.enabled=${AI_REMEDIATION_CACHE_ENABLED:true}
ai.remediation.static-templates.enabled=${AI_REMEDIATION_STATIC_ENABLED:true}

# Groq (gratuit, sans carte) : https://console.groq.com → API Keys
ai.groq.api-key=${AI_GROQ_API_KEY:}
ai.groq.model=${AI_GROQ_MODEL:openai/gpt-oss-120b}
ai.groq.model-fast=${AI_GROQ_MODEL_FAST:openai/gpt-oss-20b}
ai.groq.reasoning-effort=${AI_GROQ_REASONING_EFFORT:low}
ai.groq.fallback-to-ollama=${AI_GROQ_FALLBACK_TO_OLLAMA:true}
ai.groq.fallback-to-openrouter=${AI_GROQ_FALLBACK_TO_OPENROUTER:true}
ai.groq.fallback-to-gemini=${AI_GROQ_FALLBACK_TO_GEMINI:false}
pipeline.secret=${PIPELINE_SECRET:}
ai.knowledge.dir=${AI_KNOWLEDGE_DIR:./knowledge}

# OpenRouter (secours cloud gratuit — liste essayée dans l'ordre)
ai.openrouter.api-key=${AI_OPENROUTER_API_KEY:}
# openrouter/free = routeur auto (choisit un modèle gratuit disponible) — recommandé en 1er
ai.openrouter.models=${AI_OPENROUTER_MODELS:openrouter/free,openai/gpt-oss-20b:free,qwen/qwen3-coder:free,cohere/north-mini-code:free,meta-llama/llama-3.3-70b-instruct:free}
# Legacy (utilisé seulement si ai.openrouter.models est vide)
ai.openrouter.model=${AI_OPENROUTER_MODEL:qwen/qwen3-coder:free}
ai.openrouter.model-fallback=${AI_OPENROUTER_MODEL_FALLBACK:openai/gpt-oss-20b:free}
ai.openrouter.retry-on-429=${AI_OPENROUTER_RETRY_ON_429:true}
ai.openrouter.max-retries-per-model=${AI_OPENROUTER_MAX_RETRIES:1}
ai.openrouter.http-referer=${AI_OPENROUTER_HTTP_REFERER:http://localhost:4200}

# Ollama (local, pas de clé) : ollama pull <modèle> puis ollama serve
# GPU 24Go+ : qwen3-coder:30b | GPU 16Go : gpt-oss:20b | Machine modeste : qwen2.5-coder:7b
ai.ollama.url=${AI_OLLAMA_URL:http://localhost:11434}
ai.ollama.model=${AI_OLLAMA_MODEL:qwen2.5-coder:7b}
ai.ollama.temperature=0.2
ai.ollama.num-predict=${AI_OLLAMA_NUM_PREDICT:4096}
ai.ollama.read-timeout-seconds=${AI_OLLAMA_READ_TIMEOUT_SECONDS:600}
# 0 = forcer CPU (évite CUDA) ; -1 = laisser Ollama utiliser le GPU
ai.ollama.num-gpu=${AI_OLLAMA_NUM_GPU:0}

# Gemini (Google, quota souvent limité en free)
ai.gemini.api-key=${AI_GEMINI_API_KEY:}
ai.gemini.model=${AI_GEMINI_MODEL:gemini-2.0-flash}